<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ForeCast · PYL0N</title>
<link rel="icon" type="image/svg+xml" href="favicon.svg">
<link rel="manifest" href="manifest.json">
<link rel="stylesheet" href="libs/fonts.css">
<script src="libs/xlsx.full.min.js"></script>
<script src="libs/html2pdf.bundle.min.js"></script>
<script src="vendor/pyl0n-native.js"></script>
<script src="https://alcdn.msauth.net/browser/2.30.0/js/msal-browser.min.js"></script>
<script src="vendor/pyl0n-cloud.js"></script>
<script src="vendor/pyl0n-state.js"></script>
<script src="vendor/pyl0n-validate.js"></script>
<script src="vendor/pyl0n-suite.js"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:      #f5f4f0;
  --surface: #ffffff;
  --border:  #e0ddd6;
  --text:    #1a1916;
  --muted:   #6b6860;
  --faint:   #a8a49e;
  --accent:  #c026d3;
  --accent2: #a21caf;
  --green:   #107c41;
  --green-dk:#0a6032;
  --red:     #c0392b;
  --amber:   #b45309;
  --input-bg:       #faf9f7;
  --input-bg-focus: #ffffff;
}

[data-theme="dark"] {
  --bg:      #111110;
  --surface: #1c1c1a;
  --border:  #2e2d2a;
  --text:    #f0ede8;
  --muted:   #9c9a94;
  --faint:   #6b6860;
  --input-bg:       #17160f;
  --input-bg-focus: #1c1c1a;
}

body {
  font-family: 'DM Sans', system-ui, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
}

/* ── Toolbar ────────────────────────────────────────────────────────── */
#toolbar {
  position: sticky; top: 0; z-index: 100;
  background: rgba(255,255,255,0.92);
  backdrop-filter: blur(12px);
  border-bottom: 1px solid var(--border);
  padding: 10px 24px;
  display: flex; align-items: center; justify-content: space-between;
  gap: 12px; flex-wrap: wrap;
}
[data-theme="dark"] #toolbar { background: rgba(28,28,26,0.95); }

.tb-left  { display: flex; align-items: center; gap: 12px; }
.tb-right { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; }
.tb-sep   { width: 1px; height: 22px; background: var(--border); }

.logo-icon {
  width: 28px; height: 28px;
  background: var(--accent);
  border-radius: 7px;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.logo-icon svg { width: 14px; height: 14px; }

.tool-name { font-size: 14px; font-weight: 700; letter-spacing: -0.3px; }
.tool-tag  { font-size: 9px; font-weight: 600; color: var(--faint); letter-spacing: 1px; text-transform: uppercase; }

.tb-btn {
  font-family: 'DM Sans', sans-serif;
  font-size: 11px; font-weight: 500;
  padding: 6px 12px; border-radius: 7px;
  border: 1.5px solid var(--border);
  background: var(--bg); color: var(--muted);
  cursor: pointer; white-space: nowrap;
  transition: all .15s;
}
.tb-btn:hover   { border-color: var(--accent); color: var(--accent); background: var(--surface); }
.tb-btn:disabled { opacity: 0.35; pointer-events: none; }
.tb-btn.green   { background: var(--green); color: #fff; border-color: var(--green); font-weight: 600; }
.tb-btn.green:hover { background: var(--green-dk); }
.tb-btn.primary { background: var(--accent); color: #fff; border-color: var(--accent); font-weight: 600; }
.tb-btn.primary:hover { background: var(--accent2); }

/* ── Editor container ───────────────────────────────────────────────── */
#editor { max-width: 1320px; margin: 0 auto; padding: 24px 24px 80px; }

/* ── Section title ──────────────────────────────────────────────────── */
.sec-title {
  font-size: 11px; font-weight: 700;
  color: var(--faint); letter-spacing: 1px; text-transform: uppercase;
  margin-bottom: 12px;
}

/* ── Meta row (project name) ────────────────────────────────────────── */
.meta-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 18px;
}
.meta-row label {
  font-size: 10px; font-weight: 700; letter-spacing: 0.8px;
  text-transform: uppercase; color: var(--faint); white-space: nowrap;
}
.meta-row input[type="text"] {
  flex: 1; max-width: 400px;
  padding: 8px 12px; border: 1.5px solid var(--border); border-radius: 8px;
  background: var(--input-bg); color: var(--text);
  font-size: 14px; font-weight: 600; font-family: inherit;
  transition: border-color 0.15s;
}
.meta-row input[type="text"]:focus {
  outline: none; border-color: var(--accent); background: var(--input-bg-focus);
}

/* ── Capacity row ───────────────────────────────────────────────────── */
.cap-row {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 22px;
  background: var(--surface); border: 1.5px solid var(--border); border-radius: 10px;
  padding: 12px 18px;
}
.cap-row label {
  font-size: 11px; font-weight: 600; color: var(--muted); white-space: nowrap;
}
.cap-input {
  width: 130px;
  padding: 7px 10px; border: 1.5px solid var(--border); border-radius: 7px;
  background: var(--input-bg); color: var(--text);
  font-size: 14px; font-family: 'DM Mono', monospace; font-weight: 600;
  transition: border-color 0.15s;
}
.cap-input:focus { outline: none; border-color: var(--accent); background: var(--input-bg-focus); }
.cap-unit { font-size: 11px; font-weight: 600; color: var(--faint); }
.cap-hint { font-size: 11px; color: var(--faint); margin-left: auto; }

/* ── Dashboard grid ─────────────────────────────────────────────────── */
.dash-grid {
  display: grid;
  grid-template-columns: 1fr 1fr repeat(4, 1fr);
  gap: 14px;
  margin-bottom: 28px;
}
@media (max-width: 1100px) { .dash-grid { grid-template-columns: 1fr 1fr 1fr; } }
@media (max-width: 640px)  { .dash-grid { grid-template-columns: 1fr 1fr; } }

/* ── Stat card (summary) ────────────────────────────────────────────── */
.dash-card {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  padding: 16px 18px;
  transition: border-color 0.2s, background 0.2s;
}
.dash-card.alarm {
  background: #fff0f0; border-color: var(--red);
}
.dash-card.warn {
  background: #fffbeb; border-color: var(--amber);
}
[data-theme="dark"] .dash-card.alarm { background: #2a0a0a; border-color: var(--red); }
[data-theme="dark"] .dash-card.warn  { background: #1e1200; border-color: var(--amber); }

.dash-label {
  font-size: 9px; font-weight: 700; letter-spacing: 1px;
  text-transform: uppercase; color: var(--faint); margin-bottom: 6px;
}
.dash-value {
  font-size: 22px; font-weight: 700; letter-spacing: -0.5px;
  font-family: 'DM Mono', monospace;
}
.dash-sub { font-size: 10px; color: var(--muted); margin-top: 3px; }

/* ── Quarter progress bar ───────────────────────────────────────────── */
.q-bar-track {
  height: 4px; border-radius: 99px;
  background: var(--border); margin-top: 10px; overflow: hidden;
}
.q-bar-fill {
  height: 100%; border-radius: 99px;
  background: var(--accent); transition: width 0.35s ease;
  min-width: 0;
}
.q-bar-fill.warn  { background: var(--amber); }
.q-bar-fill.alarm { background: var(--red); }

/* ── Alarm / warning badges ─────────────────────────────────────────── */
.dash-alarm-badge,
.dash-warn-badge {
  display: inline-block; margin-top: 8px;
  padding: 2px 8px; border-radius: 99px;
  font-size: 9px; font-weight: 700; letter-spacing: 0.5px; color: #fff;
}
.dash-alarm-badge { background: var(--red); }
.dash-warn-badge  { background: var(--amber); }

/* ── Opportunity table wrapper ──────────────────────────────────────── */
.opp-wrap {
  background: var(--surface);
  border: 1.5px solid var(--border);
  border-radius: 12px;
  overflow: hidden;
  margin-bottom: 16px;
}

/* 9-column grid: name | customer | quarter | gross | pgo | pwin | weighted | owner | del */
.opp-head,
.opp-row {
  display: grid;
  grid-template-columns: minmax(140px,2fr) 100px 72px 96px 62px 62px 96px minmax(100px,1.5fr) 32px;
  align-items: center;
  gap: 3px;
  padding: 7px 10px;
}

/* ── Table header ───────────────────────────────────────────────────── */
.opp-head {
  background: var(--bg);
  border-bottom: 1px solid var(--border);
  font-size: 9px; font-weight: 700;
  color: var(--faint); letter-spacing: 0.8px; text-transform: uppercase;
}
.opp-head-r { text-align: right; }

/* ── Table rows ─────────────────────────────────────────────────────── */
.opp-row { border-bottom: 1px solid var(--border); }
.opp-row:last-child { border-bottom: none; }
.opp-row:hover { background: #fdf4ff; }
[data-theme="dark"] .opp-row:hover { background: #1c0022; }

.opp-row input,
.opp-row select {
  width: 100%;
  padding: 5px 7px; border: 1.5px solid transparent; border-radius: 6px;
  background: transparent; color: var(--text);
  font-size: 12px; font-family: inherit;
  transition: border-color 0.15s, background 0.15s;
}
.opp-row input[type="number"] {
  font-family: 'DM Mono', monospace; text-align: right;
}
.opp-row input:focus,
.opp-row select:focus {
  outline: none;
  border-color: var(--accent);
  background: var(--input-bg-focus);
}
.opp-row select { cursor: pointer; }

/* ── Weighted value cell (read-only) ────────────────────────────────── */
.weighted-cell {
  font-size: 12px; font-family: 'DM Mono', monospace; font-weight: 600;
  color: var(--accent); padding: 5px 7px; text-align: right; white-space: nowrap;
}

/* ── Delete button ──────────────────────────────────────────────────── */
.opp-del {
  background: none; border: none; color: var(--faint);
  cursor: pointer; font-size: 13px;
  padding: 4px 6px; border-radius: 5px;
  transition: color 0.15s; justify-self: center;
}
.opp-del:hover { color: var(--red); }

/* ── Table footer ───────────────────────────────────────────────────── */
.opp-footer {
  padding: 10px 14px;
  border-top: 1px solid var(--border);
  background: var(--bg);
  display: flex; justify-content: space-between; align-items: center;
  flex-wrap: wrap; gap: 8px;
}
.add-btn {
  font-size: 12px; font-weight: 600; color: var(--accent);
  background: none; border: 1.5px dashed var(--border); border-radius: 7px;
  padding: 7px 14px; cursor: pointer; font-family: 'DM Sans', sans-serif;
  transition: all 0.15s;
}
.add-btn:hover { border-color: var(--accent); background: #fdf4ff; }
[data-theme="dark"] .add-btn:hover { background: #1f0028; }

.opp-totals {
  font-size: 11px; color: var(--muted);
  display: flex; gap: 16px; flex-wrap: wrap;
}
.opp-totals strong {
  color: var(--text); font-family: 'DM Mono', monospace;
}

/* ── Watermark ──────────────────────────────────────────────────────── */
.watermark {
  font-size: 10px; color: var(--faint);
  text-align: center; padding: 28px 0 0;
}

/* ── Responsive: collapse header on narrow screens ──────────────────── */
@media (max-width: 820px) {
  .opp-head { display: none; }
  .opp-row  { grid-template-columns: 1fr 1fr; gap: 6px; padding: 12px; }
  .opp-del  { grid-column: 2; justify-self: end; }
  .cap-hint { display: none; }
}

/* ── Print ──────────────────────────────────────────────────────────── */
@media print {
  #toolbar { display: none !important; }
  .opp-del, .add-btn, .opp-footer .add-btn { display: none !important; }
}
</style>
</head>
